<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Google</title>
  <link rel="stylesheet" href="style.css">
  
</head>
<body>

  <!-- Logo -->
  <h1>
    <span style="color:#4285F4;">G</span>
    <span style="color:#EA4335;">o</span>
    <span style="color:#FBBC05;">o</span>
    <span style="color:#4285F4;">g</span>
    <span style="color:#34A853;">l</span>
    <span style="color:#EA4335;">e</span>
  </h1>

  <!-- Search Bar -->
  <div class="search-box">
    <span class="material-icons" style="color:#9aa0a6;">search</span>
    <input type="text" placeholder="Search Google or type a URL">
    <span class="material-icons" style="color:#4285F4;">mic</span>
    <span class="material-icons" style="color:#4285F4;">photo_camera</span>
  </div>

  <!-- Buttons -->
  <div class="buttons">
    <button>Google Search</button>
    <button>I'm Feeling Lucky</button>
  </div>

  <!-- Language -->
  <div class="language">
    Google offered in: <a href="#">Kiswahili</a>
  </div>

  <!-- Footer -->
  <div class="footer">
    <div class="footer-top">Kenya</div>
    <div class="footer-bottom">
      <div>
        <a href="#">About</a>
        <a href="#">Advertising</a>
        <a href="#">Business</a>
        <a href="#">How Search works</a>
      </div>
      <div>
        <a href="#">Privacy</a>
        <a href="#">Terms</a>
        <a href="#">Settings</a>
      </div>
    </div>
  </div>

</body>
</html>
